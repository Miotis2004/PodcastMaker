<main class="shell">
  <section class="hero">
    <p class="eyebrow">DialogCast foundation</p>
    <h1>PodcastMaker</h1>
    <p>
      Local-first AI podcast studio foundation with an ASP.NET Core API, Angular shell,
      and replaceable engine boundaries for Ollama, storage, TTS, audio, and exports.

  </section>
</main>
